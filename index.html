<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .button-list {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .button-list a {
            text-decoration: none;
        }
        .responsive-button {
            background-color: #777;
            color: #fff;
            padding: 15px 0; /* Set padding for top and bottom */
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            width: 100%;
            display: block;
            text-align: center;
        }
        .responsive-button:hover {
            background-color: #48a48f;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        @media (max-width: 768px) {
            .responsive-button {
                padding: 12px 0;
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .responsive-button {
                padding: 10px 0;
                font-size: 12px;
            }
        .emoji {
            font-size: 5rem;    
        }
    </style>
</head>
<body>
    <div class="emoji">
        &#x1F469;&#x200D;&#x1F4BB;
    </div>
    <ul class="button-list">
        <li><a href="https://bsky.app/profile/dpkgme.tech" target="_blank"><button class="responsive-button">bluesky</button></a></li>
        <li><a href="https://vsco.co/dpkgme" target="_blank"><button class="responsive-button">vsco</button></a></li>
        <li><a href="https://dpkgme.tumblr.com" target="_blank"><button class="responsive-button">tumblr</button></a></li>
        <li><a href="https://open.spotify.com/user/akmz" target="_blank"><button class="responsive-button">spotify</button></a></li>
        <li><a href="https://github.com/dpkgme" target="_blank"><button class="responsive-button">github</button></a></li>
    </ul>
</body>
</html>
